<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="16px"
    height="16px"
    viewBox="0 0 24 24">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:rgb(255,255,255);stop-opacity:1" />
			<stop offset="50%" style="stop-color:rgb(20,20,20);stop-opacity:1" />
            <stop offset="100%" style="stop-color:rgb(255,255,255);stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect
        x="2"
        y="2"
        width="20"
        height="20"
        fill="url(#grad1)"
        rx="2"
        ry="2"
    />
	<rect
		x="3"
		y="3"
		width="18"
		height="18"
		fill-opacity="0"
		stroke="#d779c9"
		stroke-width="2"
		stroke-linejoin="round"
	/>
	<rect
		x="2"
		y="2"
		width="20"
		height="20"
		fill-opacity="0"
		stroke="#8d2a7f"
		stroke-width="1.5"
		stroke-linejoin="round"
	/>
</svg>
